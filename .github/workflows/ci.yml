name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      checks: write
      pull-requests: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Cache Electron compilation outputs
        uses: actions/cache@v4
        id: cache-electron-dist
        with:
          path: |
            electron-dist
            helper-dist
          key: electron-dist-${{ runner.os }}-${{ hashFiles('electron/**/*.ts', 'helper/**/*.ts', 'tsconfig.electron.json', 'tsconfig.helper.json', 'tsconfig.preload.json') }}
          restore-keys: |
            electron-dist-${{ runner.os }}-

      - name: Cache Next.js build outputs
        uses: actions/cache@v4
        id: cache-nextjs
        with:
          path: |
            .next
            out
          key: nextjs-${{ runner.os }}-${{ hashFiles('app/**', 'components/**', 'lib/**', 'hooks/**', 'next.config.ts', 'package.json') }}
          restore-keys: |
            nextjs-${{ runner.os }}-

      - name: Run linter
        run: bun run lint

      - name: Type check (parallel)
        run: |
          bun run electron:compile &
          bun run preload:build &
          bun run helper:build &
          wait

      - name: Build verification
        run: bun run build


